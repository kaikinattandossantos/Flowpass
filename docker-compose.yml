services:
  postgres:
    image: postgres:16
    container_name: flowpass-postgres
    environment:
      POSTGRES_USER: flowpass
      POSTGRES_PASSWORD: flowpass_password
      POSTGRES_DB: flowpass
    ports:
      - "55432:5432"
    volumes:
      - flowpass_pg:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: flowpass-redis
    ports:
      - "6379:6379"

volumes:
  flowpass_pg:
